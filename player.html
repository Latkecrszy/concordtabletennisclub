<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Player Profile - Concord Table Tennis Club</title>
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="Concord Table Tennis Club">
  <meta id="og-title" property="og:title" content="Player Profile - Concord Table Tennis Club">
  <meta id="og-description" property="og:description" content="Rating history, head-to-head records, and session results from Concord Table Tennis Club.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.svg">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title"><a href="index.html">Concord Table Tennis Club</a></div>
                    <nav>
      <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">&#9776;</button>
      <a href="index.html">Home</a>
      <a href="firstvisit.html">First Visit</a>
      <a href="about.html">About</a>
      <a href="roundrobins.html">Round Robins</a>
      <a href="leaderboard.html">Leaderboard</a>
      <a href="halloffame.html">Hall of Fame</a>
      <a href="membership.html">Membership</a>
      <a href="coaching.html">Coaching</a>
      <a href="rules.html">Rules</a>
      <a href="pictures.html">Pictures</a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdbpyuHfnAEMRjwcA4fM1cgb75ieaa8xzXpKImt8ljRoC1WZA/viewform" target="_blank" rel="noopener">Contact</a>
    </nav>
  </div>
</header>

<main id="profile-main">
  <p id="profile-status" style="color:var(--muted);font-size:0.9rem">Loading...</p>
</main>

<footer>
  Concord Table Tennis Club, Walnut Creek, CA. Open since 1972. A 501(c)(3) nonprofit, sanctioned by USATT.
</footer>

<script src="navtoggle.js"></script>

<script>
(function () {
  var SVG_NS = "http://www.w3.org/2000/svg";

  var params = new URLSearchParams(window.location.search);
  var playerName = params.get("name") || "";
  var profileMain = document.getElementById("profile-main");
  var profileStatus = document.getElementById("profile-status");

  if (!playerName) {
    profileStatus.textContent = "No player specified.";
    return;
  }

  document.title = playerName + " - Concord Table Tennis Club";
  var ogTitle = document.getElementById("og-title");
  if (ogTitle) ogTitle.setAttribute("content", playerName + " - Concord Table Tennis Club");

  function createSvg(tag) {
    return document.createElementNS(SVG_NS, tag);
  }

  function formatShortDate(dateStr) {
    var parts = String(dateStr || "").split("-");
    if (parts.length !== 3) return "";
    return Number(parts[1]) + "/" + Number(parts[2]) + "/" + parts[0].slice(2);
  }

  function formatLongDate(dateStr) {
    var MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
    var parts = String(dateStr || "").split("-");
    if (parts.length !== 3) return dateStr;
    return MONTHS[parseInt(parts[1]) - 1] + " " + parseInt(parts[2]) + ", " + parts[0];
  }

  function signed(n) {
    return n > 0 ? "+" + n : String(n);
  }

  function ratingBounds(history) {
    var ratings = history.map(function (item) { return item.rating; });
    var min = Math.min.apply(null, ratings);
    var max = Math.max.apply(null, ratings);
    if (!Number.isFinite(min) || !Number.isFinite(max)) { min = 0; max = 1; }
    if (min === max) { min -= 1; max += 1; }
    return { min: min, max: max };
  }

  function makeRatingChart(history) {
    var width = 600;
    var height = 120;
    var padLeft = 38;
    var padRight = 10;
    var padTop = 8;
    var padBottom = 24;

    var svg = createSvg("svg");
    svg.setAttribute("viewBox", "0 0 " + width + " " + height);
    svg.setAttribute("class", "rating-chart-full");
    svg.setAttribute("aria-hidden", "true");

    if (!history.length) return svg;

    var bounds = ratingBounds(history);
    var xMax = Math.max(1, history.length - 1);

    var points = history.map(function (item, i) {
      var x = padLeft + ((width - padLeft - padRight) * i / xMax);
      var y = padTop + ((height - padTop - padBottom) * (bounds.max - item.rating) / (bounds.max - bounds.min));
      return x.toFixed(1) + "," + y.toFixed(1);
    }).join(" ");

    var line = createSvg("polyline");
    line.setAttribute("points", points);
    line.setAttribute("fill", "none");
    line.setAttribute("stroke", "#8B1A1A");
    line.setAttribute("stroke-width", "2");
    line.setAttribute("stroke-linecap", "round");
    line.setAttribute("stroke-linejoin", "round");
    svg.appendChild(line);

    var axis = createSvg("line");
    axis.setAttribute("x1", padLeft);
    axis.setAttribute("x2", width - padRight);
    axis.setAttribute("y1", height - padBottom + 6);
    axis.setAttribute("y2", height - padBottom + 6);
    axis.setAttribute("stroke", "#ddd8d0");
    svg.appendChild(axis);

    var minLabel = createSvg("text");
    minLabel.setAttribute("x", 0);
    minLabel.setAttribute("y", height - padBottom + 4);
    minLabel.textContent = Math.round(bounds.min);
    svg.appendChild(minLabel);

    var maxLabel = createSvg("text");
    maxLabel.setAttribute("x", 0);
    maxLabel.setAttribute("y", padTop + 4);
    maxLabel.textContent = Math.round(bounds.max);
    svg.appendChild(maxLabel);

    var firstDate = createSvg("text");
    firstDate.setAttribute("x", padLeft);
    firstDate.setAttribute("y", height - 4);
    firstDate.textContent = formatShortDate(history[0].date);
    svg.appendChild(firstDate);

    var lastDate = createSvg("text");
    lastDate.setAttribute("x", width - padRight);
    lastDate.setAttribute("y", height - 4);
    lastDate.setAttribute("text-anchor", "end");
    lastDate.textContent = formatShortDate(history[history.length - 1].date);
    svg.appendChild(lastDate);

    return svg;
  }

  var yearDetailsCache = {};

  function loadYearDetails(year) {
    if (!yearDetailsCache[year]) {
      yearDetailsCache[year] = fetch("data/session-details-" + year + ".json")
        .then(function (r) {
          if (!r.ok) throw new Error("failed");
          return r.json();
        });
    }
    return yearDetailsCache[year];
  }

  function makeRecentTable(history, targetName) {
    var all = history.slice().reverse();
    var wrapper = document.createElement("div");

    function buildTable(entries) {
      var table = document.createElement("table");
      table.className = "profile-sessions-table";

      var thead = document.createElement("thead");
      var headRow = document.createElement("tr");
      ["Date", "Rating", "Change"].forEach(function (label) {
        var th = document.createElement("th");
        th.textContent = label;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      var tbody = document.createElement("tbody");
      entries.forEach(function (entry, i) {
        var prevEntry = entries[i + 1];
      var delta = prevEntry ? entry.rating - prevEntry.rating : null;
      var row = document.createElement("tr");
      row.className = "profile-session-row";

      var dateCell = document.createElement("td");
      var chevron = document.createElement("span");
      chevron.className = "session-chevron";
      chevron.textContent = "▶";
      dateCell.appendChild(chevron);
      dateCell.appendChild(document.createTextNode(formatLongDate(entry.date)));
      row.appendChild(dateCell);

      var ratingCell = document.createElement("td");
      ratingCell.textContent = entry.rating;
      row.appendChild(ratingCell);

      var adjCell = document.createElement("td");
      adjCell.className = "profile-adj";
      if (delta !== null) {
        adjCell.textContent = signed(delta);
        adjCell.dataset.sign = delta > 0 ? "pos" : delta < 0 ? "neg" : "zero";
      } else {
        adjCell.textContent = "-";
      }
      row.appendChild(adjCell);

      row.addEventListener("click", function () {
        var next = row.nextElementSibling;
        if (next && next.classList.contains("profile-session-detail-row")) {
          next.remove();
          row.classList.remove("expanded");
          return;
        }
        row.classList.add("expanded");

        var detailRow = document.createElement("tr");
        detailRow.className = "profile-session-detail-row";
        var detailCell = document.createElement("td");
        detailCell.colSpan = 3;
        detailCell.textContent = "Loading...";
        detailRow.appendChild(detailCell);
        row.parentNode.insertBefore(detailRow, row.nextSibling);

        var year = entry.date.split("-")[0];
        loadYearDetails(year)
          .then(function (sessions) {
            var session = sessions.find(function (s) { return s.date === entry.date; });
            if (!session) { detailCell.textContent = "Session data not available."; return; }
            var playerData = null;
            session.groups.forEach(function (group) {
              group.players.forEach(function (p) {
                if (p.name.toLowerCase() === targetName.toLowerCase()) playerData = p;
              });
            });
            if (!playerData) { detailCell.textContent = "Could not find player in this session."; return; }
            if (playerData.matchesUnavailable || !playerData.matches || !playerData.matches.length) {
              detailCell.textContent = "Match detail not available for this session.";
              return;
            }
            detailCell.innerHTML = "";
            var matchTable = document.createElement("table");
            matchTable.className = "profile-match-table";
            var mtbody = document.createElement("tbody");
            playerData.matches.forEach(function (m) {
              var win = m.gamesWon > m.gamesLost;
              var mrow = document.createElement("tr");

              var nameCell = document.createElement("td");
              var nameLink = document.createElement("a");
              nameLink.href = "player.html?name=" + encodeURIComponent(m.opponent);
              nameLink.textContent = m.opponent;
              nameCell.appendChild(nameLink);
              mrow.appendChild(nameCell);

              var scoreCell = document.createElement("td");
              scoreCell.textContent = m.gamesWon + "-" + m.gamesLost;
              scoreCell.className = win ? "match-win" : "match-loss";
              mrow.appendChild(scoreCell);

              var mAdjCell = document.createElement("td");
              mAdjCell.textContent = (m.adj > 0 ? "+" : "") + m.adj;
              mAdjCell.className = "profile-adj";
              mAdjCell.dataset.sign = m.adj > 0 ? "pos" : m.adj < 0 ? "neg" : "zero";
              mrow.appendChild(mAdjCell);

              mtbody.appendChild(mrow);
            });
            matchTable.appendChild(mtbody);
            detailCell.appendChild(matchTable);
          })
          .catch(function () {
            detailCell.textContent = "Could not load match data.";
          });
      });

        tbody.appendChild(row);
      });
      table.appendChild(tbody);
      return table;
    }

    var limit = 20;
    wrapper.appendChild(buildTable(all.slice(0, limit)));

    if (all.length > limit) {
      var showMoreBtn = document.createElement("button");
      showMoreBtn.className = "show-more-sessions";
      showMoreBtn.textContent = "Show all " + all.length + " sessions";
      showMoreBtn.addEventListener("click", function () {
        var existing = wrapper.querySelector("table");
        wrapper.replaceChild(buildTable(all), existing);
        showMoreBtn.remove();
      });
      wrapper.appendChild(showMoreBtn);
    }

    return wrapper;
  }

  function makeH2HTable(headToHead) {
    var rivals = Object.keys(headToHead || {}).map(function (name) {
      var r = headToHead[name];
      return { name: name, wins: r.wins, losses: r.losses, total: r.wins + r.losses };
    }).sort(function (a, b) {
      return (b.total - a.total) || a.name.localeCompare(b.name);
    });

    var table = document.createElement("table");
    table.className = "profile-h2h-table";

    var thead = document.createElement("thead");
    var headRow = document.createElement("tr");
    ["Opponent", "W-L", "Matches"].forEach(function (label) {
      var th = document.createElement("th");
      th.textContent = label;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    var tbody = document.createElement("tbody");
    rivals.forEach(function (rival) {
      var row = document.createElement("tr");

      var nameCell = document.createElement("td");
      var link = document.createElement("a");
      link.href = "player.html?name=" + encodeURIComponent(rival.name);
      link.textContent = rival.name;
      nameCell.appendChild(link);
      row.appendChild(nameCell);

      var recordCell = document.createElement("td");
      recordCell.textContent = rival.wins + "-" + rival.losses;
      row.appendChild(recordCell);

      var totalCell = document.createElement("td");
      totalCell.textContent = rival.total;
      row.appendChild(totalCell);

      tbody.appendChild(row);
    });

    if (!rivals.length) {
      var emptyRow = document.createElement("tr");
      var emptyCell = document.createElement("td");
      emptyCell.colSpan = 3;
      emptyCell.textContent = "No head-to-head records.";
      emptyRow.appendChild(emptyCell);
      tbody.appendChild(emptyRow);
    }

    table.appendChild(tbody);
    return table;
  }

  function renderProfile(player, rank, rankChange, totalPlayers) {
    profileMain.innerHTML = "";

    var backLink = document.createElement("p");
    backLink.className = "profile-back";
    var back = document.createElement("a");
    back.href = "leaderboard.html";
    back.textContent = "Back to Leaderboard";
    backLink.appendChild(back);
    profileMain.appendChild(backLink);

    var heading = document.createElement("h1");
    heading.textContent = player.name;
    profileMain.appendChild(heading);

    var rankStr = rank ? "#" + rank : "";
    if (rankStr && rankChange !== null && rankChange !== 0) {
      rankStr += " <span class=\"rank-change\" data-dir=\"" + (rankChange > 0 ? "up" : "down") + "\">"
        + (rankChange > 0 ? "▲" + rankChange : "▼" + Math.abs(rankChange)) + " this month</span>";
    }

    var topPct = totalPlayers ? Math.max(1, Math.ceil(100 * rank / totalPlayers)) : null;

    var ogDesc = document.getElementById("og-description");
    if (ogDesc && rank) {
      ogDesc.setAttribute("content", player.name + " · Rating " + player.currentRating + " (Top " + topPct + "%) · " + player.sessionsPlayed + " sessions at Concord Table Tennis Club.");
    }

    var meta = document.createElement("p");
    meta.className = "profile-meta";
    var metaParts = [];
    if (rankStr) metaParts.push("Rank: <strong>" + rankStr + "</strong>");
    if (topPct !== null) metaParts.push("<span class=\"profile-percentile\">Top " + topPct + "%</span>");
    metaParts.push(
      "Rating: <strong>" + player.currentRating + "</strong>",
      "Peak: " + player.peakRating,
      "Sessions: " + player.sessionsPlayed,
      "Record: " + player.totalWins + "-" + player.totalLosses
    );
    meta.innerHTML = metaParts.join("&ensp;&middot;&ensp;");
    profileMain.appendChild(meta);

    var chartSection = document.createElement("section");
    var chartHeading = document.createElement("h2");
    chartHeading.textContent = "Rating History";
    chartSection.appendChild(chartHeading);
    if (player.ratingHistory && player.ratingHistory.length) {
      chartSection.appendChild(makeRatingChart(player.ratingHistory));
    } else {
      var noChart = document.createElement("p");
      noChart.style.color = "var(--muted)";
      noChart.textContent = "No rating history available.";
      chartSection.appendChild(noChart);
    }
    profileMain.appendChild(chartSection);

    var bottomGrid = document.createElement("div");
    bottomGrid.className = "profile-bottom-grid";

    var recentSection = document.createElement("section");
    var recentHeading = document.createElement("h2");
    recentHeading.textContent = "Recent Sessions";
    recentSection.appendChild(recentHeading);
    if (player.ratingHistory && player.ratingHistory.length) {
      recentSection.appendChild(makeRecentTable(player.ratingHistory, player.name));
    } else {
      var noSessions = document.createElement("p");
      noSessions.style.color = "var(--muted)";
      noSessions.textContent = "No session data available.";
      recentSection.appendChild(noSessions);
    }
    bottomGrid.appendChild(recentSection);

    var h2hSection = document.createElement("section");
    var h2hHeading = document.createElement("h2");
    var rivalCount = Object.keys(player.headToHead || {}).length;
    h2hHeading.textContent = "Head-to-Head (" + rivalCount + " opponents)";
    h2hSection.appendChild(h2hHeading);
    h2hSection.appendChild(makeH2HTable(player.headToHead));
    bottomGrid.appendChild(h2hSection);

    profileMain.appendChild(bottomGrid);
  }

  fetch("data/players.json")
    .then(function (r) {
      if (!r.ok) throw new Error("fetch failed");
      return r.json();
    })
    .then(function (data) {
      var allPlayers = data.players || [];
      var normalizedQuery = playerName.toLowerCase();
      var playerIndex = -1;
      var player = null;
      allPlayers.forEach(function (p, i) {
        if (p.name.toLowerCase() === normalizedQuery) { player = p; playerIndex = i; }
      });
      if (!player) {
        profileStatus.textContent = "Player not found: " + playerName;
        return;
      }

      var rank = playerIndex + 1;

      // Rank 30 days ago: re-sort all players by their rating at the cutoff
      var cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 30);
      var cutoffStr = cutoff.toISOString().slice(0, 10);

      function ratingAt(p, date) {
        var h = p.ratingHistory || [];
        for (var i = h.length - 1; i >= 0; i--) {
          if (h[i].date <= date) return h[i].rating;
        }
        return null;
      }

      var ranked30 = allPlayers
        .map(function (p) { return { name: p.name, r: ratingAt(p, cutoffStr) }; })
        .filter(function (p) { return p.r !== null; })
        .sort(function (a, b) { return b.r - a.r; });

      var oldRankIndex = ranked30.findIndex(function (p) { return p.name === player.name; });
      var oldRank = oldRankIndex === -1 ? null : oldRankIndex + 1;
      var rankChange = (oldRank !== null) ? oldRank - rank : null;

      renderProfile(player, rank, rankChange, allPlayers.length);
    })
    .catch(function () {
      profileStatus.textContent = "Could not load player data.";
    });
}());
</script>

</body>
</html>
